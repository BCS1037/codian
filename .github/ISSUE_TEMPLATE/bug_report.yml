name: Bug report
description: Report reproducible Codian behavior
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not include credentials, private vault content, transcripts, or local agent instructions.
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: 1.0.0 or commit SHA
    validations:
      required: true
  - type: dropdown
    id: provider
    attributes:
      label: Provider
      options:
        - Claude
        - Codex
        - OpenCode
        - Pi
        - Grok
        - Kimi Code
        - Provider-neutral UI
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Use synthetic data and list exact steps.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Obsidian version, operating system, provider CLI version, and installation method.
    validations:
      required: true
